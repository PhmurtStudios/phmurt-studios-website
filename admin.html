<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Phmurt Studios</title>
  <meta name="description" content="Phmurt Studios admin dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Cormorant+Garamond:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="phmurt-auth.js"></script>
  <style>
    .admin-wrap{max-width:1200px;margin:0 auto;padding:0 24px 56px}
    .admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
    .admin-card{background:var(--bg-card);border:1px solid var(--border);padding:22px 20px;border-radius:6px;box-shadow:0 12px 24px rgba(0,0,0,.14)}
    .admin-title{font-family:Cinzel,serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
    .admin-value{font-family:Cinzel,serif;font-size:28px;color:var(--text);margin-bottom:8px}
    .admin-sub{font-size:16px;line-height:1.7;color:var(--text-dim)}
    .admin-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .admin-btn{padding:11px 16px;border:1px solid var(--crimson-border);background:rgba(192,57,43,.08);color:var(--text);font-family:Cinzel,serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px}
    .admin-btn.primary{background:var(--crimson);color:#f5f0e8}
    .admin-panel{background:var(--bg-card);border:1px solid var(--border);padding:24px;border-radius:6px}
    .admin-list{display:grid;gap:12px;margin-top:16px}
    .admin-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 16px;border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,.02)}
    .admin-note{font-size:14px;color:var(--text-faint);font-style:italic}
    .admin-badge{display:inline-block;padding:4px 8px;border:1px solid var(--crimson-border);color:var(--crimson);font-size:10px;letter-spacing:2px;text-transform:uppercase;border-radius:999px;font-family:Cinzel,serif}
    .admin-locked{max-width:520px;margin:32px auto;background:var(--bg-card);border:1px solid var(--crimson-border);padding:28px;text-align:center;border-radius:6px}
  </style>
</head>
<body data-nav-active="Admin" data-footer-copy="Roll Well. Play Weird.">
  <div id="ps-site-shell"></div>
  <div id="ps-page-breadcrumb"></div>

  <section class="ps-page-hero">
    <div class="ps-page-eyebrow">Control Room</div>
    <div class="ps-page-title">Phmurt Studios Admin Panel</div>
    <div class="ps-page-subtitle">Site administration, account oversight, and quick-control tools</div>
  </section>

  <div class="admin-wrap">
    <div id="adminMount"></div>
  </div>

  <div id="ps-site-footer"></div>

  <script src="phmurt-shell.js"></script>
  <script>
    function esc(v){ return String(v == null ? '' : v).replace(/[&<>"]/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[ch]; }); }

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('phmurt_users_db') || '{}'); }
      catch (e) { return {}; }
    }

    function renderAdmin() {
      var mount = document.getElementById('adminMount');
      if (!mount) return;
      var session = window.PhmurtDB && typeof window.PhmurtDB.getSession === 'function' ? window.PhmurtDB.getSession() : null;
      var isAdmin = !!(window.PhmurtDB && typeof window.PhmurtDB.isAdmin === 'function' ? window.PhmurtDB.isAdmin() : session && session.isAdmin);

      if (!session) {
        mount.innerHTML = '<div class="admin-locked"><div class="admin-title">Authentication Required</div><div class="admin-sub">Sign in with your admin account to access the panel.</div><div class="admin-actions" style="justify-content:center;"><button class="admin-btn primary" onclick="window.PhmurtDB.openAuth()">Sign In</button></div></div>';
        return;
      }

      if (!isAdmin) {
        mount.innerHTML = '<div class="admin-locked"><div class="admin-title">Access Denied</div><div class="admin-sub">The account <strong>' + esc(session.email) + '</strong> is signed in, but it is not marked as an admin account.</div></div>';
        return;
      }

      var users = getUsers();
      var userList = Object.keys(users).sort().map(function(email){
        var user = users[email] || {};
        var admin = String(email).toLowerCase() === 'dreverad18@gmail.com';
        return '<div class="admin-row"><div><div style="font-family:Cinzel,serif;font-size:14px;color:var(--text);">' + esc(user.name || email) + '</div><div style="font-size:14px;color:var(--text-dim);">' + esc(email) + '</div></div><div>' + (admin ? '<span class="admin-badge">Admin</span>' : '<span class="admin-note">Standard</span>') + '</div></div>';
      }).join('');

      mount.innerHTML =
        '<div class="admin-grid" style="margin-bottom:18px;">' +
          '<div class="admin-card"><div class="admin-title">Signed In Account</div><div class="admin-value">' + esc(session.name || session.displayName || 'Admin') + '</div><div class="admin-sub">' + esc(session.email) + '</div></div>' +
          '<div class="admin-card"><div class="admin-title">Known Accounts</div><div class="admin-value">' + Object.keys(users).length + '</div><div class="admin-sub">Accounts currently stored in this browser profile.</div></div>' +
          '<div class="admin-card"><div class="admin-title">Admin Status</div><div class="admin-value">Enabled</div><div class="admin-sub">This panel is unlocked for <strong>dreverad18@gmail.com</strong>.</div></div>' +
        '</div>' +
        '<div class="admin-panel">' +
          '<div class="admin-title">Quick Actions</div>' +
          '<div class="admin-actions">' +
            '<button class="admin-btn primary" id="forceSeedBtn">Rebuild Admin Account</button>' +
            '<button class="admin-btn" id="refreshBtn">Refresh Session</button>' +
            '<button class="admin-btn" id="signOutBtn">Sign Out</button>' +
          '</div>' +
          '<div class="admin-list">' + userList + '</div>' +
        '</div>';

      document.getElementById('forceSeedBtn').addEventListener('click', function(){
        try {
          if (window.PhmurtDB && typeof window.PhmurtDB.syncSession === 'function') window.PhmurtDB.syncSession();
          alert('The admin account record was refreshed.\n\nEmail: dreverad18@gmail.com');
          renderAdmin();
        } catch (err) {
          alert('Could not rebuild the admin account.');
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', function(){
        if (window.PhmurtDB && typeof window.PhmurtDB.syncSession === 'function') window.PhmurtDB.syncSession();
        window.dispatchEvent(new Event('phmurt-auth-change'));
        renderAdmin();
      });

      document.getElementById('signOutBtn').addEventListener('click', function(){
        if (window.PhmurtDB && typeof window.PhmurtDB.signOut === 'function') window.PhmurtDB.signOut();
        renderAdmin();
      });
    }

    document.addEventListener('DOMContentLoaded', function(){
      renderAdmin();
      window.addEventListener('phmurt-auth-change', renderAdmin);
      window.addEventListener('pageshow', renderAdmin);
    });
  </script>
</body>
</html>
