<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phmurt Studios — Superuser Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0a0a; color: #f5ede0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .box { max-width: 520px; width: 100%; background: #111010; border: 1px solid rgba(255,255,255,0.09); border-radius: 6px; padding: 40px; }
  h1 { font-size: 20px; margin-bottom: 8px; color: #c0392b; }
  p { font-size: 14px; color: #8c7d6e; line-height: 1.6; margin-bottom: 20px; }
  .step { padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; background: rgba(255,255,255,0.02); }
  .step-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .step-status { font-size: 12px; color: #8c7d6e; }
  .step-status.ok { color: #27ae60; }
  .step-status.err { color: #e74c3c; }
  .step-status.working { color: #f39c12; }
  button { padding: 12px 24px; background: #c0392b; color: #f5f0e8; border: none; font-size: 13px; cursor: pointer; border-radius: 4px; margin-top: 16px; }
  button:disabled { opacity: 0.4; cursor: default; }
  code { background: #1a1212; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
</style>
</head>
<body>
<div class="box">
  <h1>Superuser Setup</h1>
  <p>This page creates the <code>dreverad@icloud.com</code> superuser account and promotes it to admin + superuser in the profiles table.</p>

  <div class="step" id="step-config">
    <div class="step-title">1. Supabase Connection</div>
    <div class="step-status" id="status-config">Checking…</div>
  </div>

  <div class="step" id="step-signup">
    <div class="step-title">2. Create Auth Account</div>
    <div class="step-status" id="status-signup">Waiting…</div>
  </div>

  <div class="step" id="step-promote">
    <div class="step-title">3. Promote to Superuser</div>
    <div class="step-status" id="status-promote">Waiting…</div>
  </div>

  <button id="run-btn" disabled>Run Setup</button>

  <p id="final-msg" style="margin-top:20px;display:none;"></p>
</div>

<script>
(function() {
  var SUPER_EMAIL = 'dreverad@icloud.com';
  var SUPER_PASS  = '+diceGoblin18';
  var SUPER_NAME  = 'Phmurt';

  var sb = (typeof phmurtSupabase !== 'undefined') ? phmurtSupabase : null;
  var btn = document.getElementById('run-btn');

  function setStatus(id, text, type) {
    var el = document.getElementById('status-' + id);
    el.textContent = text;
    el.className = 'step-status ' + (type || '');
  }

  // Step 1 — check config
  if (!sb) {
    setStatus('config', 'Supabase is NOT configured. Fill in supabase-config.js first.', 'err');
    return;
  }
  setStatus('config', 'Connected to ' + SUPABASE_URL, 'ok');
  btn.disabled = false;

  btn.addEventListener('click', async function() {
    btn.disabled = true;

    // Step 2 — create auth account
    setStatus('signup', 'Creating auth account…', 'working');
    try {
      var signUpResult = await sb.auth.signUp({
        email: SUPER_EMAIL,
        password: SUPER_PASS,
        options: { data: { name: SUPER_NAME } }
      });

      if (signUpResult.error) {
        // If user already exists, try signing in instead
        if (signUpResult.error.message.toLowerCase().includes('already') ||
            signUpResult.error.message.toLowerCase().includes('registered') ||
            signUpResult.error.status === 422) {
          setStatus('signup', 'Account already exists — signing in…', 'working');
          var signInResult = await sb.auth.signInWithPassword({
            email: SUPER_EMAIL,
            password: SUPER_PASS
          });
          if (signInResult.error) {
            setStatus('signup', 'Sign-in failed: ' + signInResult.error.message, 'err');
            btn.disabled = false;
            return;
          }
          setStatus('signup', 'Signed in as existing account.', 'ok');
        } else {
          setStatus('signup', 'Sign-up error: ' + signUpResult.error.message, 'err');
          btn.disabled = false;
          return;
        }
      } else {
        var user = signUpResult.data && signUpResult.data.user;
        if (!user) {
          setStatus('signup', 'Sign-up returned no user. Check email confirmation settings.', 'err');
          btn.disabled = false;
          return;
        }
        setStatus('signup', 'Account created (ID: ' + user.id.substring(0, 8) + '…)', 'ok');
      }

      // Step 3 — promote to superuser
      setStatus('promote', 'Updating profile…', 'working');

      // Get the current session to know the user ID
      var sessResult = await sb.auth.getSession();
      var sess = sessResult.data && sessResult.data.session;
      if (!sess || !sess.user) {
        setStatus('promote', 'No active session. The account may need email confirmation. Check your Supabase Auth settings → disable "Confirm email" if needed, then try again.', 'err');
        btn.disabled = false;
        return;
      }
      var userId = sess.user.id;

      // Upsert profile with admin + superuser flags
      var profileResult = await sb.from('profiles').upsert({
        id: userId,
        name: SUPER_NAME,
        email: SUPER_EMAIL,
        is_admin: true,
        is_superuser: true,
        is_banned: false
      }, { onConflict: 'id' });

      if (profileResult.error) {
        setStatus('promote', 'Profile update failed: ' + profileResult.error.message + '. Make sure you ran supabase-setup.sql first!', 'err');
        btn.disabled = false;
        return;
      }

      setStatus('promote', 'Profile set to admin + superuser.', 'ok');

      var msg = document.getElementById('final-msg');
      msg.style.display = 'block';
      msg.style.color = '#27ae60';
      msg.textContent = 'All done! Your superuser account is ready. You can now sign in on the main site and access the admin panel. Delete this file when finished.';

    } catch (e) {
      setStatus('promote', 'Unexpected error: ' + e.message, 'err');
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
