                    <button onClick={() => setSelectedEntity(null)} style={{ background:"none", border:"none", cursor:"pointer", color:T.textFaint }}><X size={14}/></button>
                  </div>

                  {selectedEntity.type && (
                    <div style={{ fontSize:12, color:T.textDim }}>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Type</span>
                      <span style={{ textTransform:"capitalize" }}>{selectedEntity.type}</span>
                    </div>
                  )}

                  {selectedEntity.population != null && (
                    <div style={{ fontSize:12, color:T.textDim }}>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Population</span>
                      {selectedEntity.population.toLocaleString()}
                    </div>
                  )}

                  {selectedEntity.isCoastal != null && (
                    <div style={{ display:"flex", gap:8 }}>
                      {selectedEntity.isCoastal && <Tag variant="info">Coastal</Tag>}
                      {selectedEntity.isRiverside && <Tag variant="info">Riverside</Tag>}
                    </div>
                  )}

                  {selectedEntity.description && (
                    <div style={{ fontSize:12, color:T.textDim, fontStyle:"italic" }}>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Description</span>
                      {selectedEntity.description}
                    </div>
                  )}

                  {selectedEntity.threat && (
                    <div style={{ fontSize:12, color:T.textDim }}>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Threat Level</span>
                      <Tag variant={selectedEntity.threat === "extreme" ? "critical" : selectedEntity.threat === "high" ? "danger" : selectedEntity.threat === "medium" ? "warning" : "success"}>{selectedEntity.threat}</Tag>
                    </div>
                  )}

                  {selectedEntity.capital && (
                    <div style={{ fontSize:12, color:T.textDim }}>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Capital</span>
                      {selectedEntity.capital}
                    </div>
                  )}

                  {selectedEntity.settlements && (
                    <div>
                      <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>Settlements ({selectedEntity.settlements.length})</span>
                      {selectedEntity.settlements.map((s, i) => (
                        <div key={i} style={{ fontSize:11, color:T.textDim, padding:"2px 0" }}>{s}</div>
                      ))}
                    </div>
                  )}

                  {selectedEntity.x != null && (
                    <CrimsonBtn small onClick={() => centerOn(selectedEntity.x, selectedEntity.y)} style={{ marginTop:8 }}>
                      <Compass size={10}/> Center on Map
                    </CrimsonBtn>
                  )}
                </div>
              ) : (
                <div style={{ textAlign:"center", padding:32, color:T.textFaint }}>
                  <Eye size={24} style={{ marginBottom:8, opacity:0.3 }}/>
                  <p style={{ fontSize:12, fontWeight:300 }}>Click any settlement, POI, or kingdom on the map to view details</p>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ═══ MAP VIEWPORT ═══ */}
      <div style={{ flex:1, position:"relative", overflow:"hidden", cursor: isPanning ? "grabbing" : "grab" }}
        onWheel={handleWheel}
        onMouseDown={handleMouseDown}
        onMouseMove={handleMouseMove}
        onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}>

        {/* Loading Overlay */}
        {generating && (
          <div style={{ position:"absolute", inset:0, zIndex:100, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
            <RefreshCw size={32} color={T.crimson} style={{ animation:"spin 1s linear infinite" }}/>
            <span style={{ fontFamily:T.ui, fontSize:11, letterSpacing:"2px", color:T.crimson, textTransform:"uppercase" }}>Forging World...</span>
          </div>
        )}

        {/* SVG Map */}
        {world && (
          <svg ref={svgRef}
            width="100%" height="100%"
            viewBox={`${-pan.x * zoom} ${-pan.y * zoom} ${(config.gridWidth * CELL) / zoom * 1.5} ${(config.gridHeight * CELL) / zoom * 1.5}`}
            style={{ background:BIOMES.deepOcean.color }}>

            <defs>
              {/* Parchment texture */}
              <filter id="parchment">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
                <feDiffuseLighting in="noise" lightingColor="#f5e6c8" surfaceScale="1" result="light">
                  <feDistantLight azimuth="225" elevation="45"/>
                </feDiffuseLighting>
                <feComposite in="SourceGraphic" in2="light" operator="multiply"/>
              </filter>

              {/* Water pattern */}
              <pattern id="waterPattern" width="12" height="12" patternUnits="userSpaceOnUse">
                <rect width="12" height="12" fill={BIOMES.ocean.color}/>
                <path d="M0 6 Q3 4 6 6 Q9 8 12 6" stroke="rgba(255,255,255,0.06)" strokeWidth="0.5" fill="none"/>
              </pattern>

              {/* Mountain hatch */}
              <pattern id="mountainHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(0,0,0,0.1)" strokeWidth="0.5"/>
              </pattern>

              {/* Forest dot pattern */}
              <pattern id="forestDots" width="8" height="8" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1" fill="rgba(0,80,0,0.15)"/>
                <circle cx="6" cy="6" r="1.2" fill="rgba(0,80,0,0.1)"/>
              </pattern>

              {/* Drop shadow for labels */}
              <filter id="labelShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="1" stdDeviation="1" floodColor="#000" floodOpacity="0.5"/>
              </filter>

              {/* Glow for selected */}
              <filter id="selectedGlow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            {/* ── TERRAIN ── */}
            {layers.terrain && (
              <g>
                {(() => {
                  const rects = [];
                  for (let y = 0; y < world.gridH; y += renderStep) {
                    for (let x = 0; x < world.gridW; x += renderStep) {
                      const biome = world.biomeGrid[y][x];
                      const color = biomeToSVGColor(biome);
                      rects.push(
                        <rect key={`${x},${y}`} x={x * CELL} y={y * CELL} width={CELL * renderStep + 0.5} height={CELL * renderStep + 0.5} fill={color}/>
                      );
                    }
                  }
                  return rects;
                })()}
              </g>
            )}

            {/* ── HEIGHTMAP OVERLAY ── */}
            {layers.heightmap && (
              <g opacity={0.6}>
                {(() => {
                  const rects = [];
                  for (let y = 0; y < world.gridH; y += renderStep) {
                    for (let x = 0; x < world.gridW; x += renderStep) {
                      const h = world.heightmap[y][x];
                      const v = Math.floor(h * 255);
                      rects.push(
                        <rect key={`h${x},${y}`} x={x * CELL} y={y * CELL} width={CELL * renderStep + 0.5} height={CELL * renderStep + 0.5} fill={`rgb(${v},${v},${v})`}/>
                      );
                    }
                  }
                  return rects;
                })()}
              </g>
            )}

            {/* ── MOISTURE OVERLAY ── */}
            {layers.moisture && (
              <g opacity={0.6}>
                {(() => {
                  const rects = [];
                  for (let y = 0; y < world.gridH; y += renderStep) {
                    for (let x = 0; x < world.gridW; x += renderStep) {
                      const m = world.moisture[y][x];
                      rects.push(
                        <rect key={`m${x},${y}`} x={x * CELL} y={y * CELL} width={CELL * renderStep + 0.5} height={CELL * renderStep + 0.5} fill={`rgb(0,${Math.floor(m*200)},${Math.floor(m*255)})`}/>
                      );
                    }
                  }
                  return rects;
                })()}
              </g>
            )}

            {/* ── TEMPERATURE OVERLAY ── */}
            {layers.temperature && (
              <g opacity={0.6}>
                {(() => {
                  const rects = [];
                  for (let y = 0; y < world.gridH; y += renderStep) {
                    for (let x = 0; x < world.gridW; x += renderStep) {
                      const t = world.temperature[y][x];
                      rects.push(
                        <rect key={`t${x},${y}`} x={x * CELL} y={y * CELL} width={CELL * renderStep + 0.5} height={CELL * renderStep + 0.5} fill={`rgb(${Math.floor(t*255)},${Math.floor((1-Math.abs(t-0.5)*2)*100)},${Math.floor((1-t)*255)})`}/>
                      );
                    }
                  }
                  return rects;
                })()}
              </g>
            )}

            {/* ── GRID OVERLAY ── */}
            {layers.grid && (
              <g opacity={0.15} stroke={T.text} strokeWidth={0.3}>
                {Array.from({ length: Math.ceil(world.gridW / 10) + 1 }, (_, i) => (
                  <line key={`gv${i}`} x1={i * 10 * CELL} y1={0} x2={i * 10 * CELL} y2={world.gridH * CELL}/>
                ))}
                {Array.from({ length: Math.ceil(world.gridH / 10) + 1 }, (_, i) => (
                  <line key={`gh${i}`} x1={0} y1={i * 10 * CELL} x2={world.gridW * CELL} y2={i * 10 * CELL}/>
                ))}
              </g>
            )}

            {/* ── KINGDOM TERRITORIES ── */}
            {layers.kingdoms && world.kingdoms.map((k, i) => (
              <g key={`k${i}`}>
                <path d={hullToSmoothPath(k.hull, CELL)} fill={k.color} stroke={k.borderColor} strokeWidth={2} strokeDasharray="8,4"/>
                {showLabelsAtZoom && layers.labels && (
                  <text x={k.hull.reduce((s,p) => s + p.x, 0) / k.hull.length * CELL}
                    y={k.hull.reduce((s,p) => s + p.y, 0) / k.hull.length * CELL}
                    textAnchor="middle" fill={k.borderColor.replace("0.5","0.8")}
                    fontFamily="'Cinzel', serif" fontSize={zoom > 1 ? 10 : 14} fontWeight={500}
                    letterSpacing="3px" style={{ textTransform:"uppercase" }} filter="url(#labelShadow)">
                    {k.name}
                  </text>
                )}
              </g>
            ))}

            {/* ── RIVERS ── */}
            {layers.rivers && world.rivers.map((r, i) => (
              <g key={`r${i}`}>
                <path d={pointsToSmoothPath(r.path, CELL)} fill="none" stroke="#3a7ab0" strokeWidth={r.width} strokeLinecap="round" strokeLinejoin="round" opacity={0.8}/>
                {showLabelsAtZoom && layers.labels && r.path.length > 10 && (
                  <text x={r.path[Math.floor(r.path.length / 3)].x * CELL}
                    y={r.path[Math.floor(r.path.length / 3)].y * CELL - 4}
                    fill="#5a9ac8" fontSize={8} fontFamily="'Spectral', serif" fontStyle="italic" filter="url(#labelShadow)">
                    {r.name}
                  </text>
                )}
              </g>
            ))}

            {/* ── ROADS ── */}
            {layers.roads && world.roads.map((r, i) => (
              <path key={`rd${i}`}
                d={pointsToSmoothPath(r.path, CELL)}
                fill="none"
                stroke={r.type === "major" ? "rgba(180,140,80,0.5)" : "rgba(150,130,90,0.3)"}
                strokeWidth={r.type === "major" ? 2 : 1}
                strokeDasharray={r.type === "major" ? "none" : "4,3"}
                strokeLinecap="round"/>
            ))}

            {/* ── LANDMARKS (labels) ── */}
            {layers.labels && showLabelsAtZoom && world.landmarks.map((l, i) => (
              <text key={`lm${i}`} x={l.x * CELL} y={l.y * CELL}
                textAnchor="middle" fill="rgba(255,255,255,0.5)"
                fontFamily="'Cinzel', serif" fontSize={l.type === "mountain_range" ? 11 : 9}
                fontStyle={l.type === "forest" ? "italic" : "normal"}
                letterSpacing="2px" style={{ textTransform:"uppercase" }} filter="url(#labelShadow)">
                {l.name}
              </text>
            ))}

            {/* ── SEA NAMES ── */}
            {layers.labels && world.seas.map((s, i) => (
              <text key={`sea${i}`} x={s.x * CELL} y={s.y * CELL}
                textAnchor="middle" fill="rgba(100,160,220,0.4)"
                fontFamily="'Cinzel', serif" fontSize={s.size > 500 ? 16 : 11}
                letterSpacing="6px" fontStyle="italic" style={{ textTransform:"uppercase" }} filter="url(#labelShadow)">
                {s.name}
              </text>
            ))}

            {/* ── SETTLEMENTS ── */}
            {layers.settlements && world.settlements.map((s, i) => {
              if (s.type === "hamlet" && !showHamlets) return null;
              if ((s.type === "village" || s.type === "hamlet") && !showSmallSettlements) return null;
              const size = s.type === "capital" ? 6 : s.type === "city" ? 4.5 : s.type === "town" ? 3.5 : s.type === "village" ? 2.5 : 2;
              const isSelected = selectedEntity?.name === s.name && selectedEntity?.entityType === "settlement";
              return (
                <g key={`s${i}`}
                  onClick={(e) => { e.stopPropagation(); handleEntityClick({ ...s, entityType:"settlement" }); }}
                  onMouseEnter={() => setHoveredEntity(s)}
                  onMouseLeave={() => setHoveredEntity(null)}
                  style={{ cursor:"pointer" }}>
                  {isSelected && <circle cx={s.x * CELL} cy={s.y * CELL} r={size + 4} fill="none" stroke={T.crimson} strokeWidth={1.5} filter="url(#selectedGlow)"/>}
                  {s.type === "capital" ? (
                    <>
                      <rect x={s.x * CELL - size} y={s.y * CELL - size} width={size * 2} height={size * 2} fill="#ffd700" stroke="#8b6914" strokeWidth={1} transform={`rotate(45,${s.x * CELL},${s.y * CELL})`}/>
                      <circle cx={s.x * CELL} cy={s.y * CELL} r={size * 0.5} fill="#8b6914"/>
                    </>
                  ) : s.type === "city" ? (
                    <circle cx={s.x * CELL} cy={s.y * CELL} r={size} fill="#e8d8a0" stroke="#8b7a3a" strokeWidth={1}/>
                  ) : s.type === "town" ? (
                    <circle cx={s.x * CELL} cy={s.y * CELL} r={size} fill="#c8b878" stroke="#8b7a3a" strokeWidth={0.5}/>
                  ) : (
                    <circle cx={s.x * CELL} cy={s.y * CELL} r={size} fill="#a89868" stroke="#6b5a2a" strokeWidth={0.3}/>
                  )}
                  {showLabelsAtZoom && layers.labels && (s.type === "capital" || s.type === "city" || (showSettlementDetails && s.type === "town")) && (
                    <text x={s.x * CELL} y={s.y * CELL - size - 3}
                      textAnchor="middle" fill="#f0e8d0"
                      fontFamily="'Cinzel', serif" fontSize={s.type === "capital" ? 9 : 7} fontWeight={s.type === "capital" ? 700 : 400}
                      letterSpacing={s.type === "capital" ? "1.5px" : "0.5px"} filter="url(#labelShadow)">
                      {s.name}
                    </text>
                  )}
                </g>
              );
            })}

            {/* ── POIs ── */}
            {layers.pois && world.pois.map((p, i) => {
              if (!showSmallSettlements && !p.discovered) return null;
              const isSelected = selectedEntity?.name === p.name && selectedEntity?.entityType === "poi";
              const iconColor = p.type === "dungeon" || p.type === "cave" ? "#8a5050" :
                               p.type === "ruins" || p.type === "monolith" ? "#8a8070" :
                               p.type === "tower" || p.type === "fortress" || p.type === "lighthouse" ? "#7a7a8a" :
                               p.type === "shrine" || p.type === "temple" ? "#7a8a7a" :
                               p.type === "grove" ? "#4a7a3a" :
                               p.type === "mine" ? "#8a7050" :
                               p.type === "camp" ? "#8a6a50" : "#888";
              return (
                <g key={`p${i}`}
                  onClick={(e) => { e.stopPropagation(); handleEntityClick({ ...p, entityType:"poi" }); }}
                  onMouseEnter={() => setHoveredEntity(p)}
                  onMouseLeave={() => setHoveredEntity(null)}
                  style={{ cursor:"pointer" }}>
                  {isSelected && <circle cx={p.x * CELL} cy={p.y * CELL} r={8} fill="none" stroke={T.crimson} strokeWidth={1.5} filter="url(#selectedGlow)"/>}
                  <circle cx={p.x * CELL} cy={p.y * CELL} r={3} fill={iconColor} stroke="rgba(0,0,0,0.3)" strokeWidth={0.5}/>
                  {p.type === "dungeon" && <path d={`M${p.x*CELL-2} ${p.y*CELL+1} L${p.x*CELL} ${p.y*CELL-3} L${p.x*CELL+2} ${p.y*CELL+1}`} fill="none" stroke="#c06050" strokeWidth={0.8}/>}
                  {p.type === "tower" && <line x1={p.x*CELL} y1={p.y*CELL-4} x2={p.x*CELL} y2={p.y*CELL+1} stroke="#8888aa" strokeWidth={1}/>}
                  {p.type === "shrine" && <circle cx={p.x*CELL} cy={p.y*CELL} r={4} fill="none" stroke="#7a9a7a" strokeWidth={0.5} strokeDasharray="2,2"/>}
                  {showPOILabels && layers.labels && (
                    <text x={p.x * CELL} y={p.y * CELL - 6}
                      textAnchor="middle" fill="rgba(220,200,180,0.7)"
                      fontFamily="'Spectral', serif" fontSize={6} fontStyle="italic" filter="url(#labelShadow)">
                      {p.name}
                    </text>
                  )}
                </g>
              );
            })}

            {/* ── HOVER TOOLTIP ── */}
            {hoveredEntity && !isPanning && (
              <g>
                <rect x={hoveredEntity.x * CELL + 10} y={hoveredEntity.y * CELL - 30}
                  width={Math.max(100, hoveredEntity.name.length * 7 + 20)} height={38}
                  rx={2} fill="rgba(20,20,25,0.9)" stroke="rgba(150,80,80,0.4)" strokeWidth={0.5}/>
                <text x={hoveredEntity.x * CELL + 20} y={hoveredEntity.y * CELL - 15}
                  fill="#f0e0c0" fontFamily="'Cinzel', serif" fontSize={9} fontWeight={500}>
                  {hoveredEntity.name}
                </text>
                <text x={hoveredEntity.x * CELL + 20} y={hoveredEntity.y * CELL - 3}
                  fill="rgba(200,180,150,0.6)" fontFamily="'Spectral', serif" fontSize={7}
                  style={{ textTransform:"capitalize" }}>
                  {hoveredEntity.type}{hoveredEntity.population ? ` — Pop. ${hoveredEntity.population.toLocaleString()}` : ""}
                </text>
              </g>
            )}
          </svg>
        )}

        {/* ═══ MAP CONTROLS OVERLAY ═══ */}
        <div style={{ position:"absolute", bottom:16, left:16, display:"flex", gap:8, zIndex:50 }}>
          {/* Zoom controls */}
          <div style={{ background:"rgba(20,20,25,0.85)", border:`1px solid ${T.border}`, borderRadius:2, padding:"6px 8px", display:"flex", alignItems:"center", gap:8 }}>
            <button onClick={() => setZoom(z => Math.max(0.15, z * 0.7))} style={{ background:"none", border:"none", cursor:"pointer", color:T.textMuted, padding:2 }}>
              <Minus size={12}/>
            </button>
            <span style={{ fontFamily:T.ui, fontSize:8, color:T.textDim, letterSpacing:"1px", minWidth:40, textAlign:"center" }}>{(zoom * 100).toFixed(0)}%</span>
            <button onClick={() => setZoom(z => Math.min(8, z * 1.3))} style={{ background:"none", border:"none", cursor:"pointer", color:T.textMuted, padding:2 }}>
              <Plus size={12}/>
            </button>
          </div>

          {/* Zoom presets */}
          <div style={{ background:"rgba(20,20,25,0.85)", border:`1px solid ${T.border}`, borderRadius:2, padding:"6px 8px", display:"flex", gap:6 }}>
            {zoomPresets.map(p => (
              <button key={p.label} onClick={() => setZoom(p.zoom)} style={{
                background: Math.abs(zoom - p.zoom) < 0.1 ? T.crimsonSoft : "transparent",
                border:"none", cursor:"pointer", padding:"3px 8px", borderRadius:2,
                fontFamily:T.ui, fontSize:7, letterSpacing:"1px", color: Math.abs(zoom - p.zoom) < 0.1 ? T.crimson : T.textMuted,
                textTransform:"uppercase",
              }}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* Coordinates */}
        <div style={{ position:"absolute", bottom:16, right:16, background:"rgba(20,20,25,0.85)", border:`1px solid ${T.border}`, borderRadius:2, padding:"6px 10px", zIndex:50 }}>
          <span style={{ fontFamily:T.ui, fontSize:7, letterSpacing:"1px", color:T.textFaint }}>
            {world ? `${world.gridW}x${world.gridH} — Seed: ${world.seed}` : "No world"}
          </span>
        </div>

        {/* Minimap */}
        {world && (
          <div style={{ position:"absolute", top:16, right:16, width:180, height:135, background:"rgba(20,20,25,0.9)", border:`1px solid ${T.border}`, borderRadius:2, overflow:"hidden", zIndex:50 }}>
            <svg width="180" height="135" viewBox={`0 0 ${world.gridW} ${world.gridH}`}>
              {/* Simplified terrain */}
              {(() => {
                const rects = [];
                const step = 4;
                for (let y = 0; y < world.gridH; y += step) {
                  for (let x = 0; x < world.gridW; x += step) {
                    rects.push(
                      <rect key={`mm${x},${y}`} x={x} y={y} width={step} height={step} fill={biomeToSVGColor(world.biomeGrid[y][x])}/>
                    );
                  }
                }
                return rects;
              })()}
              {/* Kingdom fills */}
              {world.kingdoms.map((k, i) => (
                <path key={`mmk${i}`} d={hullToSmoothPath(k.hull, 1)} fill={k.color} stroke={k.borderColor} strokeWidth={0.5}/>
              ))}
              {/* Settlements dots */}
              {world.settlements.filter(s => s.type === "capital" || s.type === "city").map((s, i) => (
                <circle key={`mms${i}`} cx={s.x} cy={s.y} r={s.type === "capital" ? 1.5 : 1} fill="#ffd700"/>
              ))}
              {/* Viewport indicator */}
              <rect x={(-pan.x) / CELL} y={(-pan.y) / CELL}
                width={world.gridW / zoom * 0.5} height={world.gridH / zoom * 0.5}
                fill="none" stroke={T.crimson} strokeWidth={1} opacity={0.8}/>
            </svg>
          </div>
        )}

        {/* No world message */}
        {!world && !generating && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
            <MapIcon size={48} color={T.textFaint}/>
            <span style={{ fontFamily:T.ui, fontSize:11, letterSpacing:"2px", color:T.textMuted, textTransform:"uppercase" }}>Enter a seed and click Generate</span>
          </div>
        )}
      </div>

      {/* Spin animation */}
      <style>{`@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`}</style>
    </div>
  );
}



// ═══════════════════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════════════════

function CampaignManager() {
  const [campaigns, setCampaigns] = useState([
    { id: "example", data: JSON.parse(JSON.stringify(EXAMPLE_CAMPAIGN)), isExample: true },
  ]);
  const [activeCampaignId, setActiveCampaignId] = useState("example");
  const [tab, setTab] = useState("dashboard");

  const data = campaigns.find(c=>c.id===activeCampaignId)?.data || NEW_CAMPAIGN();
  const setData = (updater) => {
    setCampaigns(prev => prev.map(c => {
      if (c.id !== activeCampaignId) return c;
      const newData = typeof updater === "function" ? updater(c.data) : updater;
      return { ...c, data: newData };
    }));
  };

  const createCampaign = () => {
    const newId = `campaign-${Date.now()}`;
    setCampaigns(prev => [...prev, { id: newId, data: NEW_CAMPAIGN(), isExample: false }]);
    setActiveCampaignId(newId);
    setTab("dashboard");
  };
  const deleteCampaign = (id) => {
    setCampaigns(prev => prev.filter(c => c.id !== id));
    if (activeCampaignId === id) {
      const remaining = campaigns.filter(c => c.id !== id);
      setActiveCampaignId(remaining[0]?.id || "");
    }
  };

  const allTabs = [
    { id:"dashboard", label:"Campaign Hub", icon:Compass, always:true },
    { id:"timeline",  label:"Timeline",     icon:Clock,   module:"timeline" },
    { id:"world",     label:"World",        icon:Globe,   module:"worldState" },
    { id:"play",      label:"Play Mode",    icon:Swords,  module:"playMode" },
    { id:"generator", label:"Map Forge",    icon:MapIcon, always:true },
    { id:"notes",     label:"Notes",        icon:BookOpen, module:"notesEditor" },
    { id:"settings",  label:"Settings",     icon:Settings, always:true },
  ];

  const tabs = allTabs.filter(t => t.always || data.modules[t.module]);

  return (
    <div style={{ width:"100%", height:"100vh", display:"flex", flexDirection:"column", background:T.bg, color:T.text, fontFamily:T.body, overflow:"hidden" }}>
      <nav style={{ display:"flex", alignItems:"center", gap:0, padding:"0 56px", height:56, flexShrink:0, borderBottom:`1px solid ${T.border}`, background:T.bgNav, position:"sticky", top:0, zIndex:200 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginRight:36 }}>
          <Crown size={16} color={T.crimson} />
          <span style={{ fontFamily:T.ui, fontSize:10, fontWeight:500, color:T.text, letterSpacing:"3px", textTransform:"uppercase" }}>Campaign Manager</span>
        </div>
        <div style={{ flex:1, display:"flex", gap:24, overflowX:"auto" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background:"transparent", border:"none", cursor:"pointer", padding:"18px 0",
              fontFamily:T.ui, fontSize:10, letterSpacing:"3px", textTransform:"uppercase",
              color:tab===t.id?T.text:T.textMuted, fontWeight:500, position:"relative",
              display:"flex", alignItems:"center", gap:6, transition:"color 0.2s", whiteSpace:"nowrap",
              borderBottom:tab===t.id?`2px solid ${T.crimson}`:"2px solid transparent",
            }}><t.icon size={13}/> {t.label}</button>
          ))}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <CampaignSelector
            campaigns={campaigns}
            activeCampaignId={activeCampaignId}
            onSelect={setActiveCampaignId}
            onCreate={createCampaign}
            onDelete={deleteCampaign}
          />
          <Bell size={14} color={T.textFaint} style={{cursor:"pointer"}} />
        </div>
      </nav>

      <div style={{ flex:1, overflow:"hidden" }}>
        <div style={{ height:"100%", overflowY:"auto" }}>
          {tab==="dashboard" && <DashboardView data={data} setData={setData} onNav={setTab}/>}
          {tab==="timeline"  && <TimelineView data={data} setData={setData}/>}
          {tab==="world"     && <WorldView data={data} setData={setData}/>}
          {tab==="play"      && <PlayView data={data} setData={setData}/>}
          {tab==="generator" && <FantasyMapGenerator />}
          {tab==="notes"     && <NotesView data={data} setData={setData}/>}
          {tab==="settings"  && <SettingsView data={data} setData={setData}/>}
        </div>
      </div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        *{box-sizing:border-box;}
        ::selection{background:${T.crimson};color:${T.text};}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${T.textFaint};border-radius:2px;}
        ::-webkit-scrollbar-thumb:hover{background:${T.textMuted};}
        input::placeholder{color:${T.textFaint};}
        textarea::placeholder{color:${T.textFaint};}
        input:focus, textarea:focus{outline:none;border-color:${T.crimson}!important;box-shadow:0 0 0 3px ${T.crimsonSoft};}
        select:focus{outline:none;border-color:${T.crimson}!important;}
        button:hover{filter:brightness(1.1);}
        input[type="range"]{-webkit-appearance:none;height:4px;background:${T.bgInput};border-radius:2px;outline:none;}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:${T.crimson};border-radius:50%;cursor:pointer;}
      `}</style>
    </div>
  );
}


    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById("campaign-root"));
    root.render(<CampaignManager />);
  </script>
</body>
</html>
