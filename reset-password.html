<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://*.supabase.in; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
  <title>Reset Password · Phmurt Studios</title>
  <meta name="description" content="Reset your Phmurt Studios account password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous"></script>
  <script src="supabase-config.js"></script>
  <script src="phmurt-auth.js"></script>
</head>
<body data-footer-copy="Roll Well. Play Weird." data-breadcrumb="Home|index.html;Reset Password">
  <div id="ps-site-shell"></div>
  <div id="ps-page-breadcrumb"></div>

  <div class="ps-page-hero">
    <div class="ps-page-eyebrow">Account</div>
    <div class="ps-page-title">Reset Password</div>
    <div class="ps-page-subtitle">Enter your details to regain access</div>
  </div>

  <div class="ps-divider"><div class="ps-div-line"></div><div class="ps-div-ornament"><div class="ps-div-dot"></div><div class="ps-div-gem"></div><div class="ps-div-dot"></div></div><div class="ps-div-line r"></div></div>

  <div class="ps-content reveal" style="max-width:480px;margin:48px auto;padding:0 24px;">
    <div id="rp-form-wrap" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;">
      <p style="font-family:Spectral;font-size:16px;color:var(--text-dim);margin-bottom:28px;text-align:center;">
        Enter the email address associated with your account and we'll help you get back in.
      </p>

      <div id="rp-error" style="display:none;color:var(--crimson);font-size:14px;margin-bottom:16px;padding:10px;background:rgba(192,57,43,0.1);border-radius:4px;font-family:Spectral;"></div>
      <div id="rp-success" style="display:none;color:#27ae60;font-size:14px;margin-bottom:16px;padding:10px;background:rgba(39,174,96,0.1);border-radius:4px;font-family:Spectral;text-align:center;"></div>

      <form id="rp-form" onsubmit="handleReset(event)" style="display:flex;flex-direction:column;gap:18px;">
        <div>
          <label for="rp-email" style="display:block;font-family:Cinzel;font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.05em;">EMAIL ADDRESS</label>
          <input id="rp-email" type="email" required placeholder="you@example.com"
            style="width:100%;box-sizing:border-box;padding:10px 14px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:Spectral;font-size:15px;" />
        </div>
        <button type="submit" class="ps-btn ps-btn-primary" style="width:100%;padding:12px;">Send Reset Link</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-family:Spectral;font-size:14px;color:var(--text-dim);">
        Remember your password? <a href="index.html" style="color:var(--crimson);">Back to home</a>
      </p>
    </div>
  </div>

  <div class="ps-divider"><div class="ps-div-line"></div><div class="ps-div-ornament"><div class="ps-div-dot"></div><div class="ps-div-gem"></div><div class="ps-div-dot"></div></div><div class="ps-div-line r"></div></div>
  <div class="fantasy-section-end">◆   ◆   ◆</div>

  <div id="ps-site-footer"></div>

  <script>
    function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('rp-email').value.trim();
      const errEl = document.getElementById('rp-error');
      const okEl  = document.getElementById('rp-success');

      errEl.style.display = 'none';
      okEl.style.display  = 'none';

      if (!email) {
        errEl.textContent = 'Please enter your email address.';
        errEl.style.display = 'block';
        return;
      }

      // Phmurt auth uses localStorage — no server-side password reset available.
      // Show a friendly message pointing users to sign in with their display name.
      okEl.innerHTML = 'If an account with that email exists, your sign-in info is stored locally in your browser. Try signing in with your display name and email on any page, or <a href="index.html" style="color:var(--crimson);">return home</a> to continue.';
      okEl.style.display = 'block';
      document.getElementById('rp-form').style.display = 'none';
    }
  </script>
  <script src="phmurt-shell.js"></script>
</body>
</html>
